name: CI-Check

on:
  push:
    branches: [ main, feat/foundations-cicd ]
  pull_request:
    branches:
      - main
      - 'epic/**'

jobs:
  verificaciones:
    runs-on: ubuntu-latest
    steps:
      # clones repo
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      # generates types before validating TS
      - name: Generate Nuxt Types
        run: pnpm nuxi prepare

      - name: Lint check
        run: pnpm lint

      - name: TypeScript Check
        run: pnpm typecheck

      - name: Build Project
        run: pnpm build

      - name: Run Unit and Integration Tests
        run: pnpm test